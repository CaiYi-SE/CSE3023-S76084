<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <style>
            label{
                display: inline-block;
                float:left;
                width: 150px;
                text-align: left; /*Change to right here if you want it close to the inputs*/
            }
            input, select {
                display: inline-block;
                float: left;
            }
        </style>
    </head>
    <body>
        <h1>Perform Car Loan Calculation</h1>
        <form id="carloan" action="processCalculateCarLoan.jsp" method="post" onsubmit="return checkLoanAmount()">
            <fieldset>
                <legend>Loan Calculations</legend>
                <label for="loanAmount">Loan Amount*</label>
                <input type="number" id="loanAmount" name="loanAmount" placeholder="E.g. 4500" min="0" required><br><br>
                <label for="period">Period</label>
                <select id='period' name='period'>
                    <option value='3'>3 years</option>
                    <option value='4'>4 years</option>
                    <option value='5'>5 years</option>
                    <option value='7'>7 years</option>
                </select><br>
                <p>
                    <input type="submit" id="btnSubmit" value="Submit">
                    <input type="reset" id="btnCancel" value="Cancel">
                </p>
            </fieldset>
        </form>
        <p>&copy; 2026 - Cai Yi</p>
    </body>
</html>
